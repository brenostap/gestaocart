<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart System v2</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img class="login-logo-img" src="img/phonecart-full.png" alt="Phone Cart">
    <div class="login-sub">Dashboard interno — acesso restrito</div>
    <div class="login-label">E-mail</div>
    <input class="login-input" type="email" id="login-email" placeholder="voce@exemplo.com" autocomplete="username">
    <div class="login-label" style="margin-top:10px">Senha</div>
    <input class="login-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>


<div id="notif-banner">
  <div class="notif-inner">
    <div class="notif-icon">🔔</div>
    <div class="notif-body">
      <div class="notif-title">
        Nova venda concluída
        <span class="notif-badge" id="notif-loja"></span>
        <span style="font-size:10px;opacity:.7" id="notif-id"></span>
      </div>
      <div class="notif-linha" id="notif-linha1"></div>
      <div class="notif-linha" id="notif-linha2"></div>
    </div>
    <button class="notif-close" onclick="fecharNotif()">×</button>
  </div>
</div>
<div class="notif-counter" id="notif-counter">0</div>
<div id="loading-overlay" style="display:none">
  <img class="load-logo-img" src="img/phonecart-icon.png" alt="" style="height:56px;width:auto;margin-bottom:6px">
  <div class="load-txt" id="loading-text">Conectando...</div>
  <div class="load-bar"><div class="load-fill" id="loading-fill"></div></div>
</div>

<div id="app">
  <div class="header">
    <div class="logo-wrap">
      <img class="logo-icon" id="header-logo" src="img/phonecart-icon.png" alt="">
      <div class="logo-text">
        <span class="logo-name" id="header-logo-name">Phone Cart</span>
        <span class="logo-sub" id="header-logo-sub">Dashboard</span>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" onclick="reloadData()">↻ Atualizar</button>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('dash',this)">Dashboard</div>
    <div class="tab" onclick="setTab('vendas',this)">Vendas</div>
    <div class="tab" onclick="setTab('estoque',this)">Estoque</div>
    <div class="tab" onclick="setTab('custos',this)">Custos</div>
    <div class="tab" onclick="setTab('equipe',this)">Equipe</div>
    <div class="tab" onclick="setTab('movs',this)">Movimentações</div>
    <div class="tab" onclick="setTab('tabela',this)">Tabela</div>
  </div>
  <div class="status-bar" id="status-bar">Pronto</div>
  <div class="content" id="content"></div>
</div>


<script src="js/config.js"></script>
<script src="js/equipe.js"></script>
<script src="js/core.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/custos.js"></script>
<script src="js/estoque.js"></script>
<script src="js/notificacoes.js"></script>
<script src="js/movimentacoes.js"></script>
<script src="js/tabela.js"></script>
<script src="js/vendas-extra.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
