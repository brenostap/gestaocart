<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart System v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/shell.css">
<link rel="stylesheet" href="css/components.css">
<script>/* aplica o tema salvo antes da primeira pintura, evitando flash */
(function(){try{var t=localStorage.getItem('pc_tema');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img class="login-logo-img" src="img/phonecart-full.png" alt="Phone Cart">
    <div class="login-sub">Dashboard interno — acesso restrito</div>
    <div class="login-label">E-mail</div>
    <input class="login-input" type="email" id="login-email" placeholder="voce@exemplo.com" autocomplete="username">
    <div class="login-label" style="margin-top:10px">Senha</div>
    <input class="login-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>


<div id="notif-banner">
  <div class="notif-inner">
    <div class="notif-icon">🔔</div>
    <div class="notif-body">
      <div class="notif-title">
        Nova venda concluída
        <span class="notif-badge" id="notif-loja"></span>
        <span style="font-size:10px;opacity:.7" id="notif-id"></span>
      </div>
      <div class="notif-linha" id="notif-linha1"></div>
      <div class="notif-linha" id="notif-linha2"></div>
    </div>
    <button class="notif-close" onclick="fecharNotif()">×</button>
  </div>
</div>
<div class="notif-counter" id="notif-counter">0</div>
<div id="loading-overlay" style="display:none">
  <img class="load-logo-img" src="img/phonecart-icon.png" alt="" style="height:56px;width:auto;margin-bottom:6px">
  <div class="load-txt" id="loading-text">Conectando...</div>
  <div class="load-bar"><div class="load-fill" id="loading-fill"></div></div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar"><!-- renderizado por shell.js --></aside>
  <main class="main">
    <div class="topbar"><div class="status-bar" id="status-bar">Pronto</div></div>
    <div class="content" id="content"></div>
  </main>
  <nav class="bottom-tabs" id="bottom-tabs"><!-- renderizado por shell.js --></nav>
</div>


<script src="js/config.js"></script>
<script src="js/equipe.js"></script>
<script src="js/core.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/custos.js"></script>
<script src="js/estoque.js"></script>
<script src="js/notificacoes.js"></script>
<script src="js/movimentacoes.js"></script>
<script src="js/tabela.js"></script>
<script src="js/vendas-extra.js"></script>
<script src="js/ui.js"></script>
<script src="js/shell.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
