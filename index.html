      <div class="card-title">
        <span>${neg.length>0?'⚠ Alertas de margem':'Distribuição de margem'}</span>
        <span style="font-size:11px;color:var(--text4)">${neg.length+baixas.length} venda${(neg.length+baixas.length)>1?'s':''} abaixo de 10%</span>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        ${[{l:'Negativa',c:dist.neg,cor:'var(--red)'},{l:'<10%',c:dist.ate10,cor:'var(--yellow)'},{l:'10–15%',c:dist.de10a15,cor:'var(--orange)'},{l:'15–20%',c:dist.de15a20,cor:'var(--text3)'},{l:'>20%',c:dist.acima20,cor:'var(--green)'}].map(f=>`<div style="background:var(--bg3);border-radius:8px;padding:6px 12px;font-size:12px;border:1px solid var(--border);text-align:center"><div style="color:${f.cor};font-weight:700;font-size:16px">${f.c}</div><div style="color:var(--text4);font-size:10px;margin-top:1px">${f.l}</div></div>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--text4);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Piores margens do período:</div>
      ${[...neg,...baixas].sort((a,b)=>a.mg-b.mg).slice(0,5).map(x=>{
        const dataFmt=x.data?x.data.replace(/T.*/,'').slice(5).replace('-','/'):' — ';
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
            <span style="flex-shrink:0;background:${x.mg<0?'rgba(255,69,58,.15)':'rgba(255,212,10,.1)'};color:${x.mg<0?'var(--red)':'var(--yellow)'};padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px">${x.mg}%</span>
            <div style="min-width:0">
              <div style="font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.modelo||'—'}</div>
              <div style="font-size:10px;color:var(--text4)">${dataFmt} · ${x.vendedor||'—'} · ${x.loja||'—'} · <span style="font-family:monospace">#${x.id}</span></div>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:10px">
            <div style="font-size:12px;font-weight:600">${brl(x.tot)}</div>
            <div style="font-size:11px;color:var(--red)">${brl(x.luc)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''

  // -- Ultimas vendas hoje ----------------------------------
  const hojeBrt=brtNow();
  const vendasHoje=filterByPeriod(allVendas)
    .filter(x=>brtSameDay(toBRT(x.data_saida), hojeBrt))
    .sort((a,b)=>(b.data_saida||'').localeCompare(a.data_saida||''))
    .slice(0,8);
  let ultimasHTML='';
  if(vendasHoje.length>0){
    const ultimasRows=vendasHoje.map(venda=>{
      const prods=venda._produtos?.filter(p=>isPrincipal(p))||[];
      const prodStr=prods.length>0?prods.map(p=>(p.titulo||'').replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').trim()).join(' + '):'—';
      const {vendedor,loja}=getVendaInfo(venda);
      const nomeCliente=(venda.cliente_nome||venda.cliente?.nome||'').split(' ').slice(0,2).join(' ');
      const lojaTag=loja==='cart'?'<span style="font-size:10px;background:rgba(91,139,245,.15);color:var(--cart);padding:1px 6px;border-radius:4px;font-weight:600">Cart</span>':loja==='urban'?'<span style="font-size:10px;background:rgba(255,159,10,.15);color:var(--urban);padding:1px 6px;border-radius:4px;font-weight:600">Urban</span>':'';
      const dataFmt=(venda.data_saida||'').slice(5,10).replace('-','/');
      const lucro=parseFloat(venda.lucro||0);
      const bruto=parseFloat(venda.valor_total||0);
      const mgV=bruto>0?Math.round(lucro/bruto*100):0;
      const mgColor=mgV<0?'var(--red)':mgV<10?'var(--yellow)':'var(--green)';
      return '<div style="display:grid;grid-template-columns:40px 60px 1fr 80px 80px 70px;gap:8px;align-items:center;padding:8px 0;border-top:1px solid var(--border);font-size:12px">'
        +'<div style="font-size:10px;color:var(--text4)">'+dataFmt+'</div>'
        +'<div style="font-size:10px;color:var(--cart);font-family:monospace;cursor:pointer;text-decoration:underline" onclick="irParaVenda('+venda.id+')">#'+venda.id+'</div>'
        +'<div style="min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+prodStr+'</div><div style="font-size:10px;color:var(--text3);margin-top:1px">'+nomeCliente+' '+lojaTag+(vendedor?' · <span style="color:var(--text4)">'+vendedor+'</span>':'')+'</div></div>'
        +'<div style="font-weight:600;text-align:right">'+brl(bruto)+'</div>'
        +'<div style="text-align:right;color:'+mgColor+';font-weight:600">'+brl(lucro)+'</div>'
        +'<div style="text-align:right;font-size:11px;color:'+mgColor+'">'+mgV+'%</div>'
        +'</div>';
    }).join('');
    ultimasHTML='<div class="card" style="margin-bottom:12px">'
      +'<div class="card-title">Últimas vendas hoje <span style="color:var(--green);font-size:10px">● ao vivo</span></div>'
      +'<div style="display:grid;grid-template-columns:40px 60px 1fr 80px 80px 70px;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text4);font-weight:600;letter-spacing:.05em;text-transform:uppercase">'
      +'<div>DATA</div><div>ID</div><div>APARELHO / CLIENTE</div><div style="text-align:right">BRUTO</div><div style="text-align:right">LUCRO</div><div style="text-align:right">MG%</div></div>'
      +ultimasRows+'</div>';
  }

  // -- Ultimas movimentacoes --------------------------------
  const todasMovs=[];
  // Saidas (vendas recentes)
  filterByPeriod(allVendas).slice(-20).reverse().slice(0,10).forEach(venda=>{
    const prods=venda._produtos?.filter(p=>isPrincipal(p))||[];
    const prodStr=prods.length>0?prods.map(p=>(p.titulo||'').replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').trim()).join('+'):'—';
    todasMovs.push({tipo:'saida',data:(venda.data_saida||'').slice(0,10),id:venda.id,aparelho:prodStr,valor:parseFloat(venda.valor_total||0),loja:getVendaInfo(venda).loja});
  });
  // Entradas (estoque disponivel recente)
  estoqueItens.slice(0,5).forEach(item=>{
    const mov=item.movimentacoes&&item.movimentacoes.length>0?item.movimentacoes[0]:null;
    const isUpgrade=mov&&mov.parent_type==='upgrade';
    const titulo=(item.titulo||'').replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').trim();
    todasMovs.push({
      tipo:isUpgrade?'upgrade':'compra',
      data:(mov?.created_at||item.created_at||'').slice(0,10),
      id:isUpgrade?(mov?.parent?.parent_id||mov?.parent_id):item.id,
      aparelho:titulo,
      valor:parseFloat(item.valor_estoque||0),
      loja:''
    });
  });
  todasMovs.sort((a,b)=>b.data.localeCompare(a.data));

  const movsHTML=todasMovs.length>0?`
    <div class="card">
      <div class="card-title">Últimas movimentações <span>entradas + saídas</span></div>
      <div style="display:grid;grid-template-columns:55px 60px 1fr 90px;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:10px;color:var(--text4);font-weight:600;letter-spacing:.05em;text-transform:uppercase">
        <div>TIPO</div><div>DATA</div><div>APARELHO</div><div style="text-align:right">VALOR</div>
      </div>
      ${todasMovs.slice(0,12).map(mov=>{
        const dataFmt=mov.data?mov.data.slice(5).replace('-','/'):' — ';
        const tipoConfig={
          saida:{label:'SAÍDA',bg:'rgba(48,209,88,.1)',color:'var(--green)'},
          upgrade:{label:'UPGRADE',bg:'rgba(255,159,10,.1)',color:'var(--urban)'},
          compra:{label:'COMPRA',bg:'rgba(91,139,245,.1)',color:'var(--cart)'}
        }[mov.tipo]||{label:mov.tipo,bg:'var(--bg3)',color:'var(--text3)'};
        return`<div style="display:grid;grid-template-columns:55px 60px 1fr 90px;gap:8px;align-items:center;padding:7px 0;border-top:1px solid var(--border);font-size:12px">
          <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${tipoConfig.bg};color:${tipoConfig.color}">${tipoConfig.label}</span>
          <span style="color:var(--text3);font-size:11px">${dataFmt}</span>
          <span style="color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${mov.aparelho}</span>
          <span style="text-align:right;font-weight:600">${mov.valor>0?brl(mov.valor):'—'}</span>
        </div>`;
      }).join('')}
    </div>`:''

  return filtersHTML+pendentesHTML+incompletasHTML+semDeviceHTML+kpi1+kpi2+metasHTML+vendedoresHTML+resultHTML+lojaHTML+alertasHTML+ultimasHTML+movsHTML;
}

function renderVendas(){
  // Verificar se veio do botao "ver pendentes"
  const mostrarPendentes = window._showPendentes === true;
  window._showPendentes = false;

  // Montar mapa de movimentacoes por venda
  const movsMap={};
  allMovs.forEach(m=>{
    if(!movsMap[m.parent_id])movsMap[m.parent_id]=[];
    movsMap[m.parent_id].push(m);
  });

  // Filtrar vendas por periodo e loja (sem canceled, sem pending por padrao)
  let v = mostrarPendentes ? getPendentes() : filterByPeriod(allVendas);
  
  // KPIs da aba vendas -- devem bater com o dashboard
  const kpiProdutos = v.reduce((a,x) => a+(x._produtos&&x._produtos.length>0?x._produtos.filter(p=>isPrincipal(p)).length:0),0);
  const kpiBruto = v.reduce((a,x) => a+parseFloat(x.valor_total||0),0);
  const kpiLucro = v.reduce((a,x) => a+parseFloat(x.lucro||0),0);
  const kpiAcess = v.reduce((a,x) => a+(x._produtos?x._produtos.filter(p=>!isPrincipal(p)).reduce((b,p)=>b+parseFloat(p.preco||0),0):0),0);
  if(currentStore!=='ambas')v=v.filter(x=>{const {loja}=getVendaInfo(x);return loja===currentStore;});

  // Enriquecer cada venda
  let rows=v.map(venda=>{
    const {loja,vendedor,atendente}=getVendaInfo(venda);
    const movs=movsMap[venda.id]||[];
    // Usar _produtos se disponivel, fallback para movimentacoes
    const prodList=venda._produtos&&venda._produtos.length>0?venda._produtos:movs;
    const principais=prodList.filter(m=>isPrincipal(m));
    const acesss=prodList.filter(m=>!isPrincipal(m));
    const acessBruto=acesss.reduce((a,m)=>a+parseFloat(m.preco||0),0);
    const acessLucro=acesss.reduce((a,m)=>a+parseFloat(m.preco||0)-parseFloat(m.valor_estoque||0),0);
    const acessResumo=acesss.map(m=>({titulo:m.titulo||m.produto?.titulo||'Acessório',preco:parseFloat(m.preco||0)}));
    // Todos os produtos principais com titulo e etiqueta
    const produtosLista=principais.map(p=>({
      titulo:p.titulo||p.produto?.titulo||'—',
      etiqueta:p.serial||p.apple?.serial||'—',
    }));
    const principal=produtosLista[0]||{titulo:'—',etiqueta:'—'};
    return{
      id:venda.id,
      data:venda.data_saida?.slice(0,10),
      cliente:venda.cliente?.nome||'—',
      produto:principal.titulo,
      etiqueta:principal.etiqueta,
      produtosLista,
      loja:loja||'—',
      vendedor:vendedor||'—',
      atendente:atendente||'—',
      isSocio:vendedor?['gustavo','marcella'].includes(vendedor.toLowerCase()):false,
      valor:parseFloat(venda.valor_total||0),
      acessBruto,
      acessLucro,
      acessResumo,
      lucro:parseFloat(venda.lucro||0),
      nPrincipais:principais.length,
      nAcess:acesss.length,
    };
  });

  // Filtros adicionais
  if(vendasSearch){
    const q=vendasSearch.toLowerCase();
    rows=rows.filter(r=>
      r.cliente.toLowerCase().includes(q)||
      r.produto.toLowerCase().includes(q)||
      r.vendedor.toLowerCase().includes(q)||
      r.atendente.toLowerCase().includes(q)||
      String(r.id).includes(q)||
      r.etiqueta.toLowerCase().includes(q)
    );
  }
  if(vendasLoja!=='todas')rows=rows.filter(r=>r.loja===vendasLoja);
  if(vendasVendedor!=='todos')rows=rows.filter(r=>r.vendedor===vendasVendedor);
  if(vendasAtendente!=='todos')rows=rows.filter(r=>r.atendente===vendasAtendente);
  if(vendasProduto)rows=rows.filter(r=>r.produtosLista&&r.produtosLista.some(p=>p.titulo.toLowerCase().includes(vendasProduto.toLowerCase())));
  // Sort por coluna
  if(vendasSortCol){
    rows=rows.slice().sort((a,b)=>{
      let va=a[vendasSortCol]||'', vb=b[vendasSortCol]||'';
      if(typeof va==='number') return (va-vb)*vendasSortDir;
      return va.toString().localeCompare(vb.toString())*vendasSortDir;
    });
  }

  // Vendedores unicos para o filtro
  const vends=[...new Set(v.map(x=>getVendaInfo(x).vendedor).filter(Boolean))].sort();
  const atends=[...new Set(v.map(x=>getVendaInfo(x).atendente).filter(Boolean))].sort();

  // Totais
  const totalBruto=rows.reduce((a,r)=>a+r.valor,0);
  const totalLucro=rows.reduce((a,r)=>a+r.lucro,0);
  const totalAcess=rows.reduce((a,r)=>a+r.acessBruto,0);
  const totalPrincipais=rows.reduce((a,r)=>a+r.nPrincipais,0);

  const lojaDot=l=>{
    if(l==='cart') return '<div class="loja-dot-cart"></div>';
    if(l==='urban') return '<div class="loja-dot-urban"></div>';
    return '<div class="loja-dot-none"></div>';
  };
  const lojaTag=l=>{
    if(l==='cart')return'<span class="vloja-cart">Cart</span>';
    if(l==='urban')return'<span class="vloja-urban">Urban</span>';
    return'';
  };

  const filtersHTML=`
    <div class="filters-bar">
      <button class="pill${currentStore==='ambas'?' active':''}" onclick="setStore('ambas',this)">Ambas</button>
      <button class="pill${currentStore==='cart'?' active':''}" onclick="setStore('cart',this)">Phone Cart</button>
      <button class="pill${currentStore==='urban'?' active':''}" onclick="setStore('urban',this)">Urban</button>
      <div class="filters-sep"></div>
      <select class="period-select" id="psel" onchange="setPeriod()" style="border-radius:20px">${gerarOpcoesMeses()}</select>
    </div>`;

  const sumsHTML=`
    <div class="vsum">
      <div class="vsumcard"><div class="vsumcard-label">Pedidos</div><div class="vsumcard-val">${rows.length}</div></div>
      <div class="vsumcard"><div class="vsumcard-label">Produtos vendidos</div><div class="vsumcard-val" style="color:var(--cart)">${totalPrincipais}</div></div>
      <div class="vsumcard"><div class="vsumcard-label">Total bruto</div><div class="vsumcard-val">${brl(totalBruto)}</div></div>
      <div class="vsumcard"><div class="vsumcard-label">Lucro total</div><div class="vsumcard-val" style="color:var(--green)">${brl(totalLucro)}</div></div>
    </div>`;

  const vendaFiltersHTML=`
    <div class="venda-filters">
      <input class="venda-search" type="text" placeholder="Buscar cliente, produto, vendedor, etiqueta..." value="${vendasSearch}" oninput="filterVendas('search',this.value)">
      <select class="period-select" onchange="filterVendas('loja',this.value)">
        <option value="todas"${vendasLoja==='todas'?' selected':''}>Todas lojas</option>
        <option value="cart"${vendasLoja==='cart'?' selected':''}>Cart</option>
        <option value="urban"${vendasLoja==='urban'?' selected':''}>Urban</option>
      </select>
      <select class="period-select" onchange="filterVendas('vendedor',this.value)">
        <option value="todos">Todos vendedores</option>
        ${vends.map(vd=>'<option value="'+vd+'"'+(vendasVendedor===vd?' selected':'')+'>'+vd.charAt(0).toUpperCase()+vd.slice(1)+'</option>').join('')}
      </select>
      <select class="period-select" onchange="filterVendas('atendente',this.value)">
        <option value="todos">Todos atendentes</option>
        ${atends.map(at=>'<option value="'+at+'"'+(vendasAtendente===at?' selected':'')+'>'+at.charAt(0).toUpperCase()+at.slice(1)+'</option>').join('')}
      </select>
      <input class="venda-search" type="text" placeholder="Filtrar modelo..." value="${vendasProduto}" oninput="filterVendas('produto',this.value)" style="max-width:160px">
      <span style="font-size:12px;color:var(--text3);white-space:nowrap">${rows.length} vendas</span>
    </div>`;

  // Helpers de formatacao
  const shortNome=n=>{if(!n||n==='—')return'—';const p=n.trim().split(/\s+/);return p.length<=2?n:p[0]+' '+p[p.length-1];};
  const shortProd=p=>{if(!p||p==='—')return'—';return p.replace(/^iphone\s+/i,'').replace(/^ipad\s+/i,'iPad ').replace(/^macbook\s+/i,'Mac ').replace(/\s*seminovo\s*$/i,' SN').replace(/\s*lacrado\s*$/i,' LAC').trim();};
  const capNome=n=>n&&n!=='—'?n.charAt(0).toUpperCase()+n.slice(1):'—';

  // Alerta de vendas sem vendedor identificado
  const semVend=v.filter(x=>{const {vendedor}=getVendaInfo(x);return !vendedor;});
  // Alerta de pendentes na aba vendas
  const pendentesVend = getPendentes();
  const alertaPendentesVendHTML = mostrarPendentes
    ? '<div style="background:rgba(255,212,10,.08);border:1px solid rgba(255,212,10,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:14px">⏳</span>'
      + '<span style="color:var(--yellow);font-weight:600">Mostrando ' + pendentesVend.length + ' venda' + (pendentesVend.length>1?'s':'') + ' pendente' + (pendentesVend.length>1?'s':'') + ' — não contabilizadas nos totais</span>'
      + '<button onclick="window._showPendentes=false;renderContent()" style="margin-left:auto;padding:3px 10px;background:transparent;border:1px solid rgba(255,212,10,.3);border-radius:6px;color:var(--yellow);font-size:11px;cursor:pointer">Ver todas</button>'
      + '</div>'
    : pendentesVend.length>0
    ? '<div style="background:rgba(255,212,10,.05);border:1px solid rgba(255,212,10,.2);border-radius:10px;padding:8px 14px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px">'
      + '<span>⏳</span>'
      + '<span style="color:var(--yellow)">' + pendentesVend.length + ' venda' + (pendentesVend.length>1?'s':'') + ' pendente' + (pendentesVend.length>1?'s':'') + ' no período — não contabilizadas</span>'
      + '<button onclick="verPendentes()" style="margin-left:auto;padding:3px 10px;background:transparent;border:1px solid rgba(255,212,10,.3);border-radius:6px;color:var(--yellow);font-size:11px;cursor:pointer">Ver</button>'
      + '</div>'
    : '';

  const alertaHTML=semVend.length>0?`<div class="vendas-alerta"><span>⚠ ${semVend.length} vendas sem vendedor identificado no obs — podem faltar na contagem</span><button onclick="window._showSemVend=!window._showSemVend;document.getElementById('content').innerHTML=renderVendas()" style="padding:3px 10px;background:transparent;border:1px solid rgba(251,191,36,.4);border-radius:6px;color:var(--yellow);font-size:11px;cursor:pointer">${window._showSemVend?'Ocultar':'Ver estas vendas'}</button></div>`:'';

  // Se flag ativa, mostrar so as sem vendedor
  let displayRows=rows;
  if(window._showSemVend){
    displayRows=semVend.map(venda=>{
      const {loja,vendedor,atendente}=getVendaInfo(venda);
      const movs=movsMap[venda.id]||[];
      const principais=movs.filter(m=>!isAcess(m));
      const acesss=movs.filter(m=>isAcess(m));
      const acessBruto=acesss.reduce((a,m)=>a+parseFloat(m.preco||0),0);
      const principal=principais[0];
      return{id:venda.id,data:venda.data_saida?.slice(0,10),cliente:venda.cliente?.nome||'—',produto:principais[0]?.titulo||principais[0]?.produto?.titulo||'—',etiqueta:principais[0]?.serial||principais[0]?.apple?.serial||'—',produtosLista:principais.map(p=>({titulo:p.titulo||p.produto?.titulo||'—',etiqueta:p.serial||p.apple?.serial||'—'})),loja:loja||'—',vendedor:vendedor||'SEM VENDEDOR',atendente:atendente||'—',valor:parseFloat(venda.valor_total||0),acessBruto,acessLucro:acesss.reduce((a,m)=>a+parseFloat(m.preco||0)-parseFloat(m.valor_estoque||0),0),acessResumo:acesss.map(m=>({titulo:m.titulo||'Acessório',preco:parseFloat(m.preco||0)})),lucro:parseFloat(venda.lucro||0),nPrincipais:principais.length,nAcess:acesss.length,obs:venda.observacoes||''};
    });
  }

  const tableRows=displayRows.slice(0,300).map(r=>{
    const acessTip=r.acessResumo.length>0
      ?r.acessResumo.map(a=>`${a.titulo.replace(/^/i,'').substring(0,25)}: ${brl(a.preco)}`).join(' · ')
      :'';
    const acessCell=r.acessBruto>0
      ?`<div class="vrow-acess" title="${acessTip}" style="cursor:default">
          ${brl(r.acessBruto)}
          ${r.nAcess>0?`<div style="font-size:10px;color:var(--text4)">${r.nAcess} item${r.nAcess>1?'s':''} · ${brl(r.acessLucro)} lucro</div>`:''}
        </div>`
      :'<div class="vrow-acess">—</div>';
    // Data formatada DD/MM e cor por margem

  const salarios = [
    { id_base: 9000000000001, desc: 'Salário Pietra',    valor: 4500, funcionario: 'pietra'   },

    { id_base: 9000000000004, desc: 'Salário Davi',      valor: 2250, funcionario: 'davi'     },
    { id_base: 9000000000005, desc: 'Salário Mel',       valor: 1500, funcionario: 'mel'      },
    { id_base: 9000000000006, desc: 'Salário Isa',       valor: 1500, funcionario: 'isa'      },
    { id_base: 9000000000007, desc: 'Salário David',     valor: 1500, funcionario: 'david'    },
    { id_base: 9000000000008, desc: 'Salário Vitinho',   valor: 2250, funcionario: 'vitinho'  },

  // ID unico por mes: base + YYYYMM (ex: 90000000000012604 para abril/2026)
  const mesNum = now.getFullYear() * 100 + (now.getMonth()+1);
  const dataHoje = now.toISOString().slice(0,10);

  // Verificar se ja existem salarios deste mes no cache
  const jaExistem = _custosCache && _custosCache.some(c => 
    c.fixo && c.data && c.data.startsWith(anoMes)
  );
  if(jaExistem) return; // ja foram gerados

  // Inserir no Supabase
  const rows = salarios.map(s => ({
    id: s.id_base * 10000 + mesNum,
    descricao: s.desc,
    valor: s.valor,
    data: dataHoje,
    area: 'funcionario',
    loja: 'ambas',
    obs: 'salário fixo mensal ' + anoMes,
    fixo: true,
    funcionario: s.funcionario
  }));

  try {
    await fetch(SB_URL+'/rest/v1/custos', {
      method: 'POST',

        'Prefer': 'resolution=ignore-duplicates'
      },
      body: JSON.stringify(rows)
    });

async function garantirSalariosDoMes(){
  const now = new Date();
  const anoMes = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const primeiroDoMes = anoMes + '-01';

  // Verificar se ja tem salarios deste mes no cache
  const salariosMes = (_custosCache||[]).filter(c =>
    c.fixo && c.data && c.data.startsWith(anoMes)
  );

  if(salariosMes.length >= SALARIOS_CONFIG.length) return; // ja gerados

  console.log('[salarios] Gerando salários de', anoMes, '...');

  // Gerar IDs unicos baseados em ano+mes+funcionario
  const anoMesNum = parseInt(anoMes.replace('-',''));
  const novos = SALARIOS_CONFIG
    .filter(s => !salariosMes.find(m => m.funcionario === s.func))
    .map((s, i) => ({
      id: anoMesNum * 100 + i + 1,
      descricao: s.desc,
      valor: s.valor,
      data: primeiroDoMes,
      area: 'funcionario',
      loja: 'ambas',
      obs: 'salário fixo mensal',
      fixo: true,
      funcionario: s.func
    }));

  if(!novos.length) return;

  try {
    const res = await fetch(SB_URL+'/rest/v1/custos', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_TOKEN,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=ignore-duplicates'
      },
      body: JSON.stringify(novos)
    });
    if(res.ok){
      // Adicionar ao cache local
      novos.forEach(n => _custosCache.unshift({
        id: n.id, desc: n.descricao, valor: n.valor,
        data: n.data, area: n.area, loja: n.loja,
        obs: n.obs, fixo: true, funcionario: n.funcionario
      }));
      console.log('[salarios] Gerados', novos.length, 'salários de', anoMes);
    }
  } catch(e){ console.error('[salarios] Erro:', e); }
}

function filterCustoPeriod(custos){
  const now = new Date();
  const nowAnoMes = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  return custos.filter(c => {
    if(!c.data) return true;
    // Usar slice direto na string para evitar bug de timezone
    // 'YYYY-MM-DD' com new Date() e interpretado como UTC, causando off-by-one no Brasil
    const dataStr = c.data.slice(0,10); // 'YYYY-MM-DD'
    const anoMes = dataStr.slice(0,7);  // 'YYYY-MM'
    const dataDate = new Date(dataStr + 'T12:00:00'); // meio-dia evita problemas de timezone

    if(currentPeriod && currentPeriod.match(/^\d{4}-\d{2}$/)){
      return anoMes === currentPeriod;
    }
    if(currentPeriod==='hoje'){
      const hj = now.toISOString().slice(0,10);
      return dataStr === hj;
    }
    if(currentPeriod==='semana'){
      const s = new Date(now);
      s.setDate(now.getDate() - now.getDay());
      s.setHours(0,0,0,0);
      return dataDate >= s;
    }
    if(currentPeriod==='mes'){
      return anoMes === nowAnoMes;
    }
    if(currentPeriod==='custom' && customDateStart){
      return dataStr >= customDateStart && dataStr <= (customDateEnd || customDateStart);
    }
    return true; // 'tudo'
  });
}

function custoParaLoja(c, loja, pctCart, pctUrban){
  // retorna o valor efetivo para uma loja especifica
  // rateio "ambas" proporcional por unidades de devices vendidas (não mais 50/50)
  if(c.loja===loja) return parseFloat(c.valor||0);
  if(c.loja==='ambas'){
    const pct = loja==='cart' ? (pctCart??0.5) : (pctUrban??0.5);
    return parseFloat(c.valor||0)*pct;
  }
  return 0;
}

async function addCusto(){
  const desc=document.getElementById('c-desc')?.value?.trim();
  const valor=parseFloat(document.getElementById('c-valor')?.value||0);
  const data=document.getElementById('c-data')?.value;
  const area=document.getElementById('c-area')?.value||'outro';
  const loja=document.getElementById('c-loja')?.value||'ambas';
  const obs=document.getElementById('c-obs')?.value||'';

  const novo={id:Date.now(),desc,valor,data,area,loja,obs,fixo:false,funcionario:null};
  await saveCustoToSB(novo);
  if(_custosCache) _custosCache.unshift(novo);
  else _custosCache = [novo];
  renderContent();

async function deleteCusto(id){
  if(!confirm('Remover este custo?')) return;
  await deleteCustoFromSB(id);
  if(_custosCache) _custosCache = _custosCache.filter(c=>c.id!==id);
  else _custosCache = getCustos().filter(c=>c.id!==id);
  document.getElementById('content').innerHTML=renderCustos();
}

function renderCustos(){
  const todos=getCustos();
  const custos=filterCustoPeriod(todos);

  // Totais por loja -- rateio proporcional por produtos vendidos
  const vMesFilt = filterByPeriod(allVendas);
  const unCart  = vMesFilt.filter(v=>v.loja==='cart').reduce((a,v)=>a+(v._produtos&&v._produtos.length>0?v._produtos.filter(p=>isPrincipal(p)).length:0),0);
  const unUrban = vMesFilt.filter(v=>v.loja==='urban').reduce((a,v)=>a+(v._produtos&&v._produtos.length>0?v._produtos.filter(p=>isPrincipal(p)).length:0),0);
  const unTotal = unCart + unUrban || 1;
  const pctCart  = unCart  / unTotal;
  const pctUrban = unUrban / unTotal;

  let totalCart=0, totalUrban=0, totalAmbas=0;
  custos.forEach(c=>{
    const v=parseFloat(c.valor||0);
    if(c.loja==='cart') totalCart+=v;
    else if(c.loja==='urban') totalUrban+=v;
    else if(c.loja==='ambas') totalAmbas+=v;
  });
  // Ambas distribuidos proporcionalmente por produtos vendidos
  const totalCartEfetivo  = totalCart  + totalAmbas * pctCart;
  const totalUrbanEfetivo = totalUrban + totalAmbas * pctUrban;
  const totalGeral = totalCart + totalUrban + totalAmbas;

  // Lucro real por loja: soma do lucro das vendas de cada loja
  const m=calc();
  const lucroCart  = vMesFilt.filter(v=>v.loja==='cart').reduce((a,v)=>a+parseFloat(v.lucro||0),0);
  const lucroUrban = vMesFilt.filter(v=>v.loja==='urban').reduce((a,v)=>a+parseFloat(v.lucro||0),0);
  const lucroCartEst=lucroCart;
  const lucroUrbanEst=lucroUrban;
  const liqCart=lucroCartEst-totalCartEfetivo-m.voTot*pctCart-m.atTot*pctCart;
  const liqUrban=lucroUrbanEst-totalUrbanEfetivo-m.voTot*pctUrban-m.atTot*pctUrban;

  const lojaTag=l=>{
    if(l==='cart')return'<span class="cloja-cart">Cart</span>';
    if(l==='urban')return'<span class="cloja-urban">Urban</span>';

  // Form de lancamento

};

function corHex(corNome){
  if(!corNome || corNome === '?') return '#d2d2d7';
  const key = corNome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  return CORES_HEX[key] || '#d2d2d7';
}

function corPrecisaBorda(corNome){
  const claras = ['branco','estelar','natural','titanio natural','titanio branco','prata','prateado','lavanda','salvia','rosa'];
  const key = (corNome||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  return claras.some(c => key.includes(c));
}

function batClassEst(bat){
  if(!bat || bat === 0) return '';
  if(bat < 80) return 'ruim';
  if(bat < 85) return 'medio';
  return 'bom';
}

function dataEntradaFmt(item){
  const mov = item.movimentacoes && item.movimentacoes.length > 0 ? item.movimentacoes[0] : null;
  const data = mov ? (mov.created_at||'').slice(0,10) : (item.created_at||'').slice(0,10);
  if(!data) return '—';
  const [y,m,d] = data.split('-');
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d}/${meses[parseInt(m)-1]}`;
}

function fornCompacto(item){
  const mov = item.movimentacoes && item.movimentacoes.length > 0 ? item.movimentacoes[0] : null;
  const isUpgrade = mov && mov.parent_type === 'upgrade';
  if(isUpgrade) return 'Upgrade';
  return (getFornNome(item) || '—').slice(0, 12);
}

function escapeKey(k){ return String(k).replace(/'/g, "\\'"); }
function escapeHtml(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function bolinhaEmoji(cor){
  const k = (cor||'').toLowerCase();
  if(k.includes('branco') || k.includes('natural') || k.includes('estelar')) return '⚪';
  if(k.includes('preto') || k.includes('meia noite') || k.includes('grafite')) return '⚫';
  if(k.includes('azul')) return '🔵';
  if(k.includes('vermelho')) return '🔴';
  if(k.includes('amarelo') || k.includes('dourado')) return '🟡';
  if(k.includes('verde')) return '🟢';
  if(k.includes('rosa') || k.includes('lavanda') || k.includes('roxo')) return '🟣';
  if(k.includes('laranja') || k.includes('desert')) return '🟠';
  return '⚪';
}

// Constroi arvore Modelo > Capacidade > Cor > [items]
function construirTreeEstoque(items, search){
  const q = (search||'').toLowerCase().trim();
  const tree = {};
  items.forEach(item => {
    const titulo = item.produto?.titulo || item.titulo || '';
    const { modelo, capacidade, cor } = parseTitulo(titulo);
    if(q){
      const matchTitulo = titulo.toLowerCase().includes(q);
      const matchImei = (item.imei_1||'').toLowerCase().includes(q);
      const matchSerial = (item.serial||'').toLowerCase().includes(q);
      const matchForn = (getFornNome(item)||'').toLowerCase().includes(q);
      if(!matchTitulo && !matchImei && !matchSerial && !matchForn) return;
    }
    if(!tree[modelo]) tree[modelo] = { caps:{}, total:0, custoTotal:0 };
    if(!tree[modelo].caps[capacidade]) tree[modelo].caps[capacidade] = { cores:{}, total:0, custoTotal:0 };
    if(!tree[modelo].caps[capacidade].cores[cor]) tree[modelo].caps[capacidade].cores[cor] = { items:[], custoTotal:0 };
    const custo = parseFloat(item.valor_estoque||0);
    tree[modelo].caps[capacidade].cores[cor].items.push(item);
    tree[modelo].caps[capacidade].cores[cor].custoTotal += custo;
    tree[modelo].caps[capacidade].total++;
    tree[modelo].caps[capacidade].custoTotal += custo;
    tree[modelo].total++;
    tree[modelo].custoTotal += custo;
  });
  return tree;
}

function renderEstoqueAgrupado(tree){
  const modelosOrdenados = Object.entries(tree).sort((a,b) => a[0].localeCompare(b[0]));
  if(modelosOrdenados.length === 0){
    return '<div style="padding:40px;text-align:center;color:var(--text-4);font-size:13px">Nenhum item encontrado</div>';
  }
  let html = '';
  modelosOrdenados.forEach(([modelo, dataModelo]) => {
    const capsCount = Object.keys(dataModelo.caps).length;
    html += `
      <div class="est-agr-modelo">
        <div class="est-agr-modelo-header">
          <div class="est-agr-modelo-nome">
            <strong>${escapeHtml(modelo)}</strong>
            <span>${dataModelo.total} un · ${capsCount} ${capsCount===1?'capacidade':'capacidades'}</span>
          </div>
          <div class="est-agr-modelo-custo">${brl(dataModelo.custoTotal)} custo</div>
        </div>`;

    const ordCap = ['64GB','128GB','256GB','512GB','1TB','?'];
    const capsOrdered = Object.entries(dataModelo.caps).sort((a,b) => {
      const ia = ordCap.indexOf(a[0]); const ib = ordCap.indexOf(b[0]);
      return (ia<0?99:ia) - (ib<0?99:ib);
    });

    capsOrdered.forEach(([cap, dataCap]) => {
      const itemRef = Object.values(dataCap.cores)[0]?.items[0];
      const precoInfo = itemRef ? getPrecoVendaSync(itemRef) : null;
      const precoVenda = precoInfo?.varejo;
      const precoHTML = precoVenda
        ? `<div class="est-cap-preco">${brl(precoVenda)}</div>`
        : `<div class="est-cap-preco empty">—</div>`;

      html += `
        <div class="est-cap-card">
          <div class="est-cap-head">
            <div>
              <div class="est-cap-label">${escapeHtml(cap)} · ${dataCap.total} un</div>
              <div class="est-cap-sub">${brl(dataCap.custoTotal)} custo total</div>
            </div>
            ${precoHTML}
          </div>
          <div class="est-cores-row">`;

      const coresOrdered = Object.entries(dataCap.cores).sort((a,b) => b[1].items.length - a[1].items.length);
      coresOrdered.forEach(([cor, dataCor]) => {
        const qtd = dataCor.items.length;
        const critico = qtd <= 2 && cor !== '?';
        const corKey = `${modelo}__${cap}__${cor}`;
        const isOpen = estoqueColorOpen === corKey;
        const hex = corHex(cor);
        const borda = corPrecisaBorda(cor) ? 'borda' : '';
        const cls = `est-cor-chip${isOpen?' active':''}${critico?' critico':''}`;
        html += `
          <div class="${cls}" onclick="toggleCorEst('${escapeKey(corKey)}')">
            <span class="est-cor-bolinha ${borda} ${critico?'critico':''}" style="background:${hex}"></span>
            <span>${escapeHtml(cor)} <strong style="font-weight:500">${qtd}</strong></span>
          </div>`;
      });
      html += `</div>`;

      const corAbertaKey = estoqueColorOpen;
      if(corAbertaKey){
        const partes = corAbertaKey.split('__');
        const mAb = partes[0], cAb = partes[1], corAb = partes.slice(2).join('__');
        if(mAb === modelo && cAb === cap){
          const dataCorAb = dataCap.cores[corAb];
          if(dataCorAb){
            html += renderImeisExpand(modelo, cap, corAb, dataCorAb.items);
          }
        }
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  return html;
}

function renderImeisExpand(modelo, cap, cor, items){
  const itemsOrdenados = items.slice().sort((a,b) => parseInt(b.bateria||0) - parseInt(a.bateria||0));

function renderEstoqueLista(tree){
  const skus = [];
  Object.entries(tree).forEach(([modelo, dataModelo]) => {
    Object.entries(dataModelo.caps).forEach(([cap, dataCap]) => {
      Object.entries(dataCap.cores).forEach(([cor, dataCor]) => {
        const custoMedio = dataCor.items.length > 0 ? dataCor.custoTotal / dataCor.items.length : 0;
        const itemRef = dataCor.items[0];
        const precoInfo = itemRef ? getPrecoVendaSync(itemRef) : null;
        skus.push({
          modelo, cap, cor,
          qtd: dataCor.items.length,
          custoMedio,
          precoVenda: precoInfo?.varejo,
          items: dataCor.items,
          critico: dataCor.items.length <= 2 && cor !== '?'
        });
      });
    });
  });

  const ordCap = ['64GB','128GB','256GB','512GB','1TB','?'];
  skus.sort((a,b) => {
    if(a.modelo !== b.modelo) return a.modelo.localeCompare(b.modelo);
    const ia = ordCap.indexOf(a.cap); const ib = ordCap.indexOf(b.cap);
    const ic = (ia<0?99:ia) - (ib<0?99:ib);
    if(ic !== 0) return ic;
    return b.qtd - a.qtd;
  });

  if(skus.length === 0){
    return '<div style="padding:40px;text-align:center;color:var(--text-4);font-size:13px">Nenhum item encontrado</div>';
  }

  let html = `
    <div class="est-lista">
      <div class="est-lista-head">
        <div></div>
        <div></div>
        <div>Modelo</div>
        <div class="center">Qtd</div>
        <div class="right">Custo méd.</div>
        <div class="right">Venda</div>
      </div>`;

  skus.forEach(sku => {
    const skuKey = `${sku.modelo}__${sku.cap}__${sku.cor}`;
    const isOpen = estoqueSkuOpen.has(skuKey);
    const hex = corHex(sku.cor);
    const borda = corPrecisaBorda(sku.cor) ? 'borda' : '';
    const criticoCls = sku.critico ? ' critico' : '';
    const aberto = isOpen ? ' aberto' : '';
    html += `
      <div class="est-sku-row${criticoCls}${aberto}" onclick="toggleSkuLista('${escapeKey(skuKey)}')">
        <div class="toggle">${isOpen ? '▾' : '▸'}</div>
        <div><span class="est-cor-bolinha ${borda} ${sku.critico?'critico':''}" style="background:${hex}"></span></div>
        <div class="nome">${escapeHtml(sku.modelo)} ${escapeHtml(sku.cap)} · ${escapeHtml(sku.cor)}</div>
        <div class="qtd">${sku.qtd}</div>
        <div class="custo-med">${sku.custoMedio>0 ? brl(sku.custoMedio) : '—'}</div>
        <div class="venda ${sku.precoVenda ? '' : 'empty'}">${sku.precoVenda ? brl(sku.precoVenda) : '—'}</div>
      </div>`;
    if(isOpen){
      html += `<div class="est-sku-expand">${renderImeisExpand(sku.modelo, sku.cap, sku.cor, sku.items)}</div>`;
    }
  });
  html += `</div>`;
  return html;
}

function toggleCorEst(corKey){
  if(estoqueColorOpen === corKey) estoqueColorOpen = null;
  else estoqueColorOpen = corKey;
  renderContent();
}

function toggleSkuLista(skuKey){
  if(estoqueSkuOpen.has(skuKey)) estoqueSkuOpen.delete(skuKey);
  else estoqueSkuOpen.add(skuKey);
  renderContent();
}

function setEstoqueViewV3(v){
  estoqueViewV3 = v;
  estoqueColorOpen = null;
  estoqueSkuOpen.clear();
  renderContent();
}

function setEstoqueSearchV3(v){
  estoqueSearchV3 = v;

  window._estSearchTimer = setTimeout(() => {
    renderContent();

    const el = document.getElementById('est-search-v3');
    if(el){
      el.focus();
      el.setSelectionRange(el.value.length, el.value.length);
    }
  }, 150);
}

      capsOrd.forEach(([cap, dataCap]) => {
        const itemRef = Object.values(dataCap.cores)[0]?.items[0];
        const precoInfo = itemRef ? getPrecoVendaSync(itemRef) : null;
        const precoTxt = precoInfo?.varejo ? ` · R$ ${precoInfo.varejo.toLocaleString('pt-BR')}` : '';
        txt += `▸ ${cap}${precoTxt}\n`;
        const coresOrd = Object.entries(dataCap.cores).sort((a,b) => b[1].items.length - a[1].items.length);
        coresOrd.forEach(([cor, dataCor]) => {
          const qtd = dataCor.items.length;
          const critico = qtd <= 2 ? ' ⚠️' : '';
          txt += `   • ${cor} — ${qtd} un${critico}\n`;
        });
      });
      txt += `\n`;
    });
    txt += `━━━━━━━━━━━━━━━\n_Phone Cart · Sala 309_\n_Pronta entrega · Garantia 90 dias_`;
    return txt;
  }

  if(template === 'C'){
    let txt = `📱 *Phone Cart* · ${dataStr}\n\n`;
    const modelosOrd = Object.entries(tree).sort((a,b) => a[0].localeCompare(b[0]));
    modelosOrd.forEach(([modelo, dataModelo]) => {
      const modeloShort = modelo.replace(/^iPhone\s+/, '');
      txt += `*${modeloShort}*\n`;
      const capsOrd = Object.entries(dataModelo.caps).sort((a,b) => {
        const ia=ordCap.indexOf(a[0]); const ib=ordCap.indexOf(b[0]);
        return (ia<0?99:ia)-(ib<0?99:ib);
      });
      capsOrd.forEach(([cap, dataCap]) => {
        const itemRef = Object.values(dataCap.cores)[0]?.items[0];
        const precoInfo = itemRef ? getPrecoVendaSync(itemRef) : null;
        const capShort = cap.replace('GB','').replace('TB','TB');
        const precoTxt = precoInfo?.varejo ? ` — R$ ${precoInfo.varejo.toLocaleString('pt-BR')}` : '';
        const coresStr = Object.entries(dataCap.cores)
          .sort((a,b) => b[1].items.length - a[1].items.length)
          .map(([cor, d]) => `${cor}(${d.items.length})`)
          .join(' ');
        txt += `${capShort}: ${coresStr}${precoTxt}\n`;
      });
      txt += `\n`;
    });
    txt += `_Garantia 90 dias_`;
    return txt;
  }
  return '';
}

  if(!txt){

  if(!txt) return;
  const btn = event?.target;

      btn.textContent = '✓ Copiado!';

// -- SISTEMA DE NOTIFICACOES ------------------------------------------------
let _lastVendaId = 0;
let _notifCount = 0;
let _pollingInterval = null;
let _notifQueue = [];
let _notifAtiva = false;

function iniciarPolling(){
  if(_pollingInterval) return;
  // Registrar o ID da ultima venda carregada como baseline
  if(allVendas.length > 0){
    _lastVendaId = Math.max(...allVendas.map(v=>v.id));
  }
  // Verificar a cada 2 minutos
  _pollingInterval = setInterval(verificarNovasVendas, 2 * 60 * 1000);
  console.log('[Notif] Polling iniciado. Última venda:', _lastVendaId);
}

async function verificarNovasVendas(){
  if(SB_TOKEN===SB_KEY) return; // sem sessão autenticada
  try{
    const r = await fetch(BASE+'/vendas?sort=data_saida:desc&page=1&perPage=5&filters[status]=completed',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_TOKEN,'Accept':'application/json'}
    });
    const d = await r.json();
    const novas = (d.data||[]).filter(v => v.id > _lastVendaId);
    if(novas.length === 0) return;

    // Buscar detalhes das vendas novas
    for(const venda of novas.reverse()){
      const det = await fetch(BASE+'/vendas/'+venda.id,{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_TOKEN,'Accept':'application/json'}
      }).then(r=>r.json()).catch(()=>null);
      const detail = det?.data || det || venda;
      _notifQueue.push(detail);
      _notifCount++;
      // Adicionar ao allVendas para nao perder
      if(!allVendas.find(v=>v.id===venda.id)){
        allVendas.unshift(venda);
      }
    }
    _lastVendaId = Math.max(...(d.data||[]).map(v=>v.id));

    // Mostrar primeira da fila
    if(!_notifAtiva) mostrarProximaNotif();

    // Atualizar badge do titulo da aba
    atualizarBadgeTab();

    // Re-renderizar o conteudo atual
    renderContent();
  } catch(e){
    console.warn('[Notif] Erro ao verificar:', e.message);
  }
}

function mostrarProximaNotif(){
  if(_notifQueue.length === 0){ _notifAtiva=false; return; }
  _notifAtiva = true;
  const venda = _notifQueue.shift();
  exibirNotif(venda);
}

function exibirNotif(venda){
  const produtos = venda.produtos || [];
  const isPrinc = p => !!(p.apple_id)||(parseFloat(p.valor_estoque||0)>=200);
  const principais = produtos.filter(isPrinc);
  const acesss = produtos.filter(p=>!isPrinc(p));
  const {loja, vendedor, atendente} = getVendaInfo(venda);
  const acessBruto = acesss.reduce((a,p)=>a+parseFloat(p.preco||0),0);

  // Linha 1: produtos
  const prodStr = principais.length > 0
    ? principais.map(p=>{
        const t=(p.titulo||'').replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').replace(/\s*Lacrado\s*$/i,' LAC');
        const s=p.serial||p.apple?.serial||'';
        return t+(s?' #'+s:'');
      }).join(' + ')
    : '—';

  const clienteNome = venda.cliente?.nome || '—';
  const clienteShort = clienteNome.split(' ').filter((_,i,a)=>i===0||i===a.length-1).join(' ');

  const SOCIOS_NOMES=['gustavo','marcella'];
  const vendLabel = vendedor ? (SOCIOS_NOMES.includes(vendedor.toLowerCase()) ? '★ Sócio: ' : 'Vendedor: ') + vendedor.charAt(0).toUpperCase()+vendedor.slice(1) : '';
  const vendedorStr = [
    vendLabel,
    atendente ? 'Atendente: '+atendente.charAt(0).toUpperCase()+atendente.slice(1) : ''
  ].filter(Boolean).join(' · ');

  const lojaStr = loja==='cart'?'Phone Cart':loja==='urban'?'Urban':'—';
  const totalStr = 'R$'+Math.round(parseFloat(venda.valor_total||0)).toLocaleString('pt-BR');
  const lucroStr = 'Lucro R$'+Math.round(parseFloat(venda.lucro||0)).toLocaleString('pt-BR');
  const acessStr = acessBruto>0 ? ' · Acess. R$'+Math.round(acessBruto).toLocaleString('pt-BR') : '';

  document.getElementById('notif-loja').textContent = lojaStr;
  document.getElementById('notif-id').textContent = '#'+venda.id;
  document.getElementById('notif-linha1').textContent = prodStr+' — '+clienteShort;
  document.getElementById('notif-linha2').textContent = totalStr+' · '+lucroStr+acessStr+(vendedorStr?' · '+vendedorStr:'');

  // Mostrar banner
  const banner = document.getElementById('notif-banner');
  banner.classList.add('show');

  // Som de notificacao (beep simples via Web Audio API)
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.4);
  } catch(e){}

  // Auto-fechar apos 12s se nao houver mais na fila
  setTimeout(()=>{
    if(_notifQueue.length > 0){
      // tem mais -- trocar pela proxima
      mostrarProximaNotif();
    } else {
      fecharNotif();
    }
  }, 12000);

  // Atualizar contador
  const counter = document.getElementById('notif-counter');
  if(_notifCount > 0){
    counter.textContent = _notifCount;
    counter.classList.add('show');
  }
}

function fecharNotif(){
  document.getElementById('notif-banner').classList.remove('show');
  _notifAtiva = false;
  // Mostrar proxima se houver
  if(_notifQueue.length > 0){
    setTimeout(mostrarProximaNotif, 500);
  } else {
    // Limpar contador
    document.getElementById('notif-counter').classList.remove('show');
    _notifCount = 0;
    document.title = 'Phone Cart — Dashboard';
  }
}

function atualizarBadgeTab(){
  if(_notifCount > 0){
    document.title = '('+_notifCount+') Phone Cart — Dashboard';
  }
}

function renderMovsCompras(){
  const v = filterByPeriod(allVendas);
  const q = movsSearchStr.toLowerCase();

  // Extrair todos os produtos vendidos (usando _produtos se disponivel, fallback allMovs)
  const movsMap={};
  allMovs.forEach(m=>{ if(!movsMap[m.parent_id])movsMap[m.parent_id]=[]; movsMap[m.parent_id].push(m); });

  const saidas = [];
  v.forEach(x => {
    let prods = [];
    if(x._produtos && x._produtos.length > 0){
      prods = x._produtos.map(p=>({...p, parent_id:x.id, data_saida:x.data_saida,
        atendente: getVendaInfo(x).atendente, vendedor: getVendaInfo(x).vendedor, loja: getVendaInfo(x).loja}));
    } else {
      prods = (movsMap[x.id]||[]).map(m=>({...m, data_saida:x.data_saida,
        atendente: getVendaInfo(x).atendente, vendedor: getVendaInfo(x).vendedor, loja: getVendaInfo(x).loja}));
    }
    saidas.push(...prods);
  });

  const filtradas = saidas.filter(p => {
    const passaQ = !q || (p.titulo||'').toLowerCase().includes(q) || (p.serial||'').toLowerCase().includes(q) || (p.imei_1||'').toLowerCase().includes(q);
    const passaTipo = movsFilterTipo==='todos' || (movsFilterTipo==='principal'&&isPrincipal(p)) || (movsFilterTipo==='acessorio'&&isAcess(p));
    return passaQ && passaTipo;
  });

  // KPIs
  const iphones = filtradas.filter(p => isPrincipal(p));
  const acess   = filtradas.filter(p => isAcess(p));
  const brutoIphone = iphones.reduce((a,p)=>a+parseFloat(p.preco||0),0);
  const brutoAcess  = acess.reduce((a,p)=>a+parseFloat(p.preco||0),0);
  const lucroIphone = iphones.reduce((a,p)=>a+parseFloat(p.preco||0)-parseFloat(p.valor_estoque||0),0);
  const lucroAcess  = acess.reduce((a,p)=>a+parseFloat(p.preco||0)-parseFloat(p.valor_estoque||0),0);

  const rows = filtradas.slice(0,300).map(p => {
    const titulo = p.titulo||p.produto?.titulo||'—';
    const tituloShort = titulo.replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').replace(/\s*Lacrado\s*$/i,' LAC').trim();
    const preco = parseFloat(p.preco||0);
    const custo = parseFloat(p.valor_estoque||0);
    const lucro = preco - custo;
    const mg = preco>0 ? Math.round(lucro/preco*100) : 0;
    const mgCls = mg<10?'bat-red':mg<20?'bat-yellow':'bat-green';
    const data = (p.data_saida||'').slice(5,10).replace('-','/');
    const serial = p.serial||'—';
    const tipo = isPrincipal(p) ? '' : '<span style="font-size:10px;color:var(--blue);font-weight:600">ACESS</span>';
    return `<div class="vrow" style="display:grid;grid-template-columns:45px 1fr 60px 80px 70px 60px;gap:0;padding:8px 12px;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text4)">${data}</div>
      <div style="font-size:12px;color:var(--text)">${tituloShort} ${tipo} <span style="color:var(--text4)">${serial}</span></div>
      <div style="font-size:11px;color:var(--text3);text-align:right">${custo>0?brl(custo):'—'}</div>
      <div style="font-size:12px;font-weight:600;text-align:right">${brl(preco)}</div>
      <div style="font-size:12px;font-weight:600;text-align:right;color:var(--green)">${brl(lucro)}</div>
      <div class="${mgCls}" style="font-size:11px;text-align:right">${mg}%</div>
    </div>`;
  }).join('');

  return `
    <div class="metric-grid" style="margin-bottom:14px">
      <div class="metric"><div class="metric-label">iPhones / Produtos</div><div class="metric-value blue">${iphones.length}</div><div class="metric-sub">${brl(brutoIphone)} bruto</div></div>
      <div class="metric"><div class="metric-label">Acessórios</div><div class="metric-value">${acess.length}</div><div class="metric-sub">${brl(brutoAcess)} bruto</div></div>
      <div class="metric"><div class="metric-label">Lucro Produtos</div><div class="metric-value green">${brl(lucroIphone)}</div><div class="metric-sub">margem ${brutoIphone>0?Math.round(lucroIphone/brutoIphone*100):0}%</div></div>
      <div class="metric"><div class="metric-label">Lucro Acessórios</div><div class="metric-value green">${brl(lucroAcess)}</div><div class="metric-sub">margem ${brutoAcess>0?Math.round(lucroAcess/brutoAcess*100):0}%</div></div>
    </div>
    <div style="background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)">
      <div style="display:grid;grid-template-columns:45px 1fr 60px 80px 70px 60px;gap:0;padding:8px 12px;border-bottom:1px solid var(--border2);font-size:11px;color:var(--text4);font-weight:600;letter-spacing:.04em">
        <div>DATA</div><div>PRODUTO</div><div style="text-align:right">CUSTO</div><div style="text-align:right">VENDA</div><div style="text-align:right">LUCRO</div><div style="text-align:right">MG</div>
      </div>
      ${rows||'<div style="padding:20px;text-align:center;color:var(--text4)">Nenhum produto encontrado</div>'}
    </div>
    ${filtradas.length>300?`<div style="margin-top:8px;font-size:12px;color:var(--text3);text-align:center">Mostrando 300 de ${filtradas.length}</div>`:''}
  `;
}


function renderMovsEntradas(){
  const q = movsSearchStr.toLowerCase();
  const items = estoqueItens || [];

  const entradas = [];
  items.forEach(function(item){
    const movs = item.movimentacoes || [];
    const titulo = item.titulo || (item.produto && item.produto.titulo) || '—';
    const tituloShort = titulo.replace(/^iPhone\s+/i,'').replace(/\s*Seminovo\s*$/i,' SN').replace(/\s*Lacrado\s*$/i,' LAC').trim();
    if(movs.length > 0){
      movs.forEach(function(mov){
        const isUpgrade = mov.parent_type === 'upgrade';
        const vendaId = isUpgrade ? (mov.parent && mov.parent.parent_id ? mov.parent.parent_id : null) : null;
        const forn = isUpgrade
          ? ('Upgrade #' + (vendaId || mov.parent_id))
          : (getFornNome(item) || 'Sem fornecedor');
        entradas.push({
          titulo: titulo, tituloShort: tituloShort,
          serial: item.serial || '—',
          imei: item.imei_1 || '—',
          bateria: parseInt(item.bateria || 0),
          custo: parseFloat(mov.preco || item.valor_estoque || 0),
          fornecedor: forn,
          isUpgrade: isUpgrade,
          vendaId: vendaId,
          data: (mov.created_at || '').slice(0,10),
          status: item.status
        });
      });
    } else {
      entradas.push({
        titulo: titulo, tituloShort: tituloShort,
        serial: item.serial || '—',
        imei: item.imei_1 || '—',
        bateria: parseInt(item.bateria || 0),
        custo: parseFloat(item.valor_estoque || 0),
        fornecedor: getFornNome(item) || 'Sem fornecedor',
        isUpgrade: false, vendaId: null,
        data: (item.created_at || '').slice(0,10),
        status: item.status
      });
    }
  });

  const filtradas = entradas.filter(function(e){
    if(!q) return true;
    return e.tituloShort.toLowerCase().includes(q) ||
           e.serial.toLowerCase().includes(q) ||
           (getFornNome({ultimo_fornecedor: e.fornecedor}) || e.fornecedor).toLowerCase().includes(q) ||
           (e.imei || '').includes(q);
  }).sort(function(a,b){ return b.data.localeCompare(a.data); });

  const totalCusto = filtradas.reduce(function(a,e){ return a+e.custo; }, 0);
  const upgrades = filtradas.filter(function(e){ return e.isUpgrade; }).length;
  const compras = filtradas.length - upgrades;
  const disponiveis = filtradas.filter(function(e){ return e.status === 'available'; }).length;

  const kpis = '<div class="metric-grid" style="margin-bottom:14px">'
    + '<div class="metric"><div class="metric-label">Total entradas</div><div class="metric-value" style="color:var(--cart)">' + filtradas.length + '</div><div class="metric-sub">' + disponiveis + ' disponíveis</div></div>'
    + '<div class="metric"><div class="metric-label">De compras</div><div class="metric-value">' + compras + '</div><div class="metric-sub">fornecedores</div></div>'
    + '<div class="metric"><div class="metric-label">De upgrades</div><div class="metric-value" style="color:var(--orange)">' + upgrades + '</div><div class="metric-sub">trocas clientes</div></div>'
    + '<div class="metric"><div class="metric-label">Custo total</div><div class="metric-value">' + brl(totalCusto) + '</div><div class="metric-sub">valor entrada</div></div>'
    + '</div>';

  const rows = filtradas.slice(0,300).map(function(e){
    const bat = e.bateria;
    const batTxt = bat > 0 ? bat + '%' : '—';
    const batCls = bat === 0 ? 'bat-dash' : bat < 80 ? 'bat-red' : bat < 85 ? 'bat-yellow' : 'bat-green';
    const dot = e.status === 'available'
      ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px"></span>'
      : '<span style="width:6px;height:6px;border-radius:50%;background:var(--text4);display:inline-block;margin-right:4px"></span>';
    const fornSpan = e.isUpgrade
      ? '<span style="color:var(--orange);font-size:11px">⬆ ' + e.fornecedor + (e.vendaId ? ' <span style="color:var(--cart);cursor:pointer;text-decoration:underline" onclick="irParaVenda(' + e.vendaId + ')">ver venda</span>' : '') + '</span>'
      : '<span style="color:var(--text3);font-size:11px">' + e.fornecedor + '</span>';
    const imeiShort = e.imei !== '—' ? e.imei.slice(-6) : '—';
    return '<div style="display:grid;grid-template-columns:50px 1fr 55px 70px 1fr 80px;gap:0;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:center">'
      + '<div style="color:var(--text4);font-size:11px">' + e.data.slice(5).replace('-','/') + '</div>'
      + '<div>' + dot + '<span style="color:var(--text);font-weight:500">' + e.tituloShort + '</span> <span style="color:var(--text4);font-size:11px">' + e.serial + '</span></div>'
      + '<div class="' + batCls + '">' + batTxt + '</div>'
      + '<div style="color:var(--text3);font-size:11px">' + imeiShort + '</div>'
      + '<div>' + fornSpan + '</div>'
      + '<div style="text-align:right;font-weight:600">' + (e.custo > 0 ? brl(e.custo) : '—') + '</div>'
      + '</div>';
  }).join('');

  return kpis
    + '<div style="background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)">'
    + '<div style="display:grid;grid-template-columns:50px 1fr 55px 70px 1fr 80px;gap:0;padding:8px 14px;border-bottom:1px solid var(--border2);font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;align-items:center">'

    + '</div>'
    + (rows || '<div style="padding:20px;text-align:center;color:var(--text4)">Nenhuma entrada encontrada</div>')
    + (filtradas.length > 300 ? '<div style="padding:10px;text-align:center;font-size:11px;color:var(--text3)">Mostrando 300 de ' + filtradas.length + '</div>' : '')
    + '</div>';
}

function editarPreco(modelo, capacidade, cellId){
  const tabelaAtual = getTabelaPrecos().find(t => t.modelo === modelo && t.cap === capacidade);
  const precoAtual = tabelaAtual ? tabelaAtual.preco : 0;
  
  // Remover edicao anterior se houver
  const anterior = document.getElementById('edit-preco-modal');
  if(anterior) anterior.remove();

  const modal = document.createElement('div');
  modal.id = 'edit-preco-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;min-width:280px;box-shadow:0 20px 60px rgba(0,0,0,.5)">
      <div style="font-size:11px;color:var(--text4);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Editar preço</div>
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px">${modelo} ${capacidade}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
        <span style="font-size:13px;color:var(--text3);font-weight:600">R$</span>
        <input id="edit-preco-input" type="number" value="${precoAtual}" min="0" max="99999"
          style="flex:1;padding:10px 12px;background:var(--bg3);border:2px solid var(--cart);border-radius:8px;color:var(--text);font-size:18px;font-weight:700;outline:none;width:100%"
          onkeydown="if(event.key==='Enter') salvarPrecoEdicao('${modelo}','${capacidade}','${cellId}');if(event.key==='Escape') document.getElementById('edit-preco-modal').remove();">
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="salvarPrecoEdicao('${modelo}','${capacidade}','${cellId}')"
          style="flex:1;padding:10px;background:var(--cart);border:none;border-radius:8px;color:white;font-size:13px;font-weight:700;cursor:pointer">
          ✓ Salvar
        </button>
        <button onclick="document.getElementById('edit-preco-modal').remove()"
          style="padding:10px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:13px;cursor:pointer">
          Cancelar
        </button>
      </div>
    </div>`;
  
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });
  
  // Focar e selecionar o input
  setTimeout(() => {
    const inp = document.getElementById('edit-preco-input');
    inp?.focus();
    inp?.select();
  }, 50);
}

async function salvarPrecoEdicao(modelo, capacidade, cellId){
  const inp = document.getElementById('edit-preco-input');
  const novoPreco = parseInt(inp?.value || 0);
  if(!novoPreco || novoPreco < 100) return alert('Preço inválido');
  
  // Fechar modal imediatamente com feedback visual
  document.getElementById('edit-preco-modal').remove();
  const cell = document.getElementById(cellId);
  if(cell){
    cell.textContent = '⏳';
    cell.style.opacity = '0.5';
  }
  
  // Salvar no Supabase
  const ok = await savePrecoBD(modelo, capacidade, novoPreco);
  
  // Atualizar a celula
  if(cell){
    cell.textContent = brl(novoPreco);
    cell.style.opacity = '1';
    cell.style.color = ok ? 'var(--green)' : 'var(--yellow)';
    setTimeout(() => { if(cell) cell.style.color = 'var(--text)'; }, 2000);
  }
  
  // Recarregar o cruzamento estoquextabela
  const content = document.getElementById('content');
  if(content && currentTab === 'tabela'){
    // So re-renderizar a parte direita para nao perder posicao
    currentTab = 'tabela';
    renderContent();
  }
}

function renderTabela(){

  const totalModelos = TABELA_PRECOS.length;
  const precoMin = Math.min(...TABELA_PRECOS.map(p=>p.preco));
  const precoMax = Math.max(...TABELA_PRECOS.map(p=>p.preco));

    const pctMargem = precoTabela && custo > 0 ? Math.round((margem/precoTabela)*100) : null;
    return { item, titulo, precoTabela, custo, margem, pctMargem };
  }).filter(x => x.precoTabela !== null);

  const semTabela = estoqueItens.filter(item => {
    const titulo = item.produto?.titulo || item.titulo || '';
    return getPrecoTabela(titulo) === null;
  });

  const totalCapitalEstoque = estoqueItens.reduce((a,i)=>a+parseFloat(i.valor_estoque||0),0);
  const totalVendaTabela = estoqueComTabela.reduce((a,x)=>a+x.precoTabela,0);
  const totalMargemEstoque = estoqueComTabela.reduce((a,x)=>a+x.margem,0);

  // -- Estoque cruzado com tabela ---------------------------
  const estoqueRows = estoqueComTabela
    .sort((a,b) => (a.pctMargem||0) - (b.pctMargem||0))

        <td style="padding:7px 10px;font-size:12px;text-align:right;font-weight:700;color:${cor}">${pctMargem}%</td>

  return `

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
      
      <div>
        <div class="card">
          <div class="card-title">📋 Tabela de preços — Seminovo</div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr>
                  <th style="padding:8px 14px;text-align:left;background:var(--bg);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.08em">Modelo</th>

                <tr style="border-bottom:1px solid var(--border2)">

                  <th style="padding:6px 10px;text-align:right;font-size:10px;color:var(--green);font-weight:600;text-transform:uppercase">Margem</th>
                  <th style="padding:6px 10px;text-align:right;font-size:10px;color:var(--text4);font-weight:600;text-transform:uppercase">%</th>
                </tr>
              </thead>
              <tbody>
                ${estoqueRows}

          </div>
          ${semTabela.length > 0 ? `<div style="margin-top:8px;font-size:11px;color:var(--text4)">⚠ ${semTabela.length} itens sem correspondência na tabela (iPad, Mac, Watch, etc)</div>` : ''}

}

function getVendasIncompletas(){
  const vendas = filterByPeriod(allVendas, true); // incluir pending tambem
  const resultado = [];

  vendas.forEach(v => {
    const info = getVendaInfo(v);
    const loja = info.loja;
    const vend = (info.vendedor||'').toLowerCase().trim();
    const atend = (info.atendente||'').toLowerCase().trim();

    const temDevice = v._produtos?.some(p => isPrincipal(p));
    const temAcess = v._produtos?.some(p => !isPrincipal(p));
    const temProduto = v._produtos && v._produtos.length > 0;
    const valor = parseFloat(v.valor_total||0);

    // Device com prejuizo: valor_estoque > preco em algum item principal
    const prejuizoDevice = v._produtos?.find(p =>
      isPrincipal(p) && parseFloat(p.preco||0) > 0 && parseFloat(p.valor_estoque||0) > parseFloat(p.preco||0)
    );

    const vendIsVO = matchNome(vend, VO_KEYS);
    const vendIsAT = matchNome(vend, AT_KEYS); // atendente pode vender device (R$25/un)
    const vendIsLoja = !vend || SOCIOS_LOJA.includes(vend);
    const vendIsKnown = vendIsVO || vendIsAT || vendIsLoja;

    const atendIsAT = matchNome(atend, AT_KEYS);
    const atendIsKnown = atendIsAT || !atend || SOCIOS_LOJA.includes(atend);

    const tipos = [];
    if(!loja) tipos.push('sem_loja');
    if(!vend && temDevice) tipos.push('sem_vendedor');
    if(!atend && temAcess) tipos.push('sem_atendente');
    if(vend && !vendIsKnown) tipos.push('vendedor_desconhecido');
    if(atend && !atendIsKnown) tipos.push('atendente_desconhecido');
    if(valor === 0 && temProduto && v.status==='completed') tipos.push('valor_zero');
    if(prejuizoDevice) tipos.push('prejuizo_device');

    if(tipos.length > 0) {
      // Severidade: 'leve' se a venda nao tem device (so acessorio) -- nao bloqueia comissao de R$25
      // 'critica' se tem device com info faltando -- impacta atribuicao de receita e comissao
      // 'critica' tambem se valor_zero com device ou prejuizo
      const ehCritica = (temDevice && (
        tipos.includes('sem_loja') ||
        tipos.includes('sem_vendedor') ||
        tipos.includes('vendedor_desconhecido') ||
        tipos.includes('prejuizo_device')
      )) || tipos.includes('valor_zero');
      const severidade = ehCritica ? 'critica' : 'leve';
      resultado.push({
        id: v.id,
        data: v.data_saida.slice(0,10),
        status: v.status,
        valor: v.valor_total,
        loja: loja || '—',
        vendedor: info.vendedor || '—',
        atendente: info.atendente || '—',
        tipos,
        severidade,
        prejuizo: prejuizoDevice ? (parseFloat(prejuizoDevice.preco) - parseFloat(prejuizoDevice.valor_estoque)) : 0,
        produtos: v._produtos?.filter(p=>isPrincipal(p)).map(p=>
          (p.titulo||'').replace(/^iPhone\s*/i,'').replace(/\s*Seminovo/i,' SN').trim().slice(0,22)
        ).join(', ') || null,
        acess: v._produtos?.filter(p=>!isPrincipal(p)).length || 0,
      });
    }
  });

  return resultado.sort((a,b) => b.data.localeCompare(a.data));
}


function abrirModalIncompletas(){
  const lista = getVendasIncompletas().filter(v => v.status === 'completed');
  const criticas = lista.filter(v => v.severidade === 'critica');
  const leves = lista.filter(v => v.severidade === 'leve');

  const labels = {
    'sem_loja': '🏪 Sem loja',
    'sem_vendedor': '👤 Sem vendedor',
    'sem_atendente': '🏷 Sem atendente',
    'vendedor_desconhecido': '❓ Vendedor desconhecido',
    'atendente_desconhecido': '❓ Atendente desconhecido',
    'valor_zero': '💸 Valor R$ 0',
    'prejuizo_device': '📉 Device com prejuízo',
  };

  function rowsHTML(itens, sev){
    if(itens.length === 0){
      return `<div style="padding:32px 0;text-align:center;color:var(--text4);font-size:12px">Nenhuma venda nesta categoria 🎉</div>`;
    }
    const cor = sev === 'critica' ? '#ff6347' : '#fbbf24';
    const bg  = sev === 'critica' ? 'rgba(255,99,71,.12)' : 'rgba(251,191,36,.15)';
    return itens.map(v => {
      const tags = v.tipos.map(t =>
        `<span style="font-size:10px;padding:2px 7px;border-radius:4px;background:${bg};color:${cor};font-weight:600">${labels[t]||t}</span>`
      ).join(' ');
      const dataFmt = v.data.slice(5).replace('-','/');
      return `
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">
                <a href="https://app.fone.ninja/vendas/${v.id}" target="_blank" rel="noopener" style="color:var(--cart);text-decoration:none">#${v.id} ↗</a> · ${dataFmt} · ${brl(v.valor||0)}${v.prejuizo>0?` · <span style="color:var(--red)">-${brl(v.prejuizo)}</span>`:''}
              </div>
              <div style="font-size:11px;color:var(--text4);margin-bottom:4px">
                ${v.produtos ? '📱 '+v.produtos : ''}${v.acess>0 ? (v.produtos?' · ':'')+v.acess+' acess.':''}
              </div>
              <div style="font-size:11px;color:var(--text3)">
                Loja: <b>${v.loja}</b> · Vendedor: <b>${v.vendedor}</b> · Atendente: <b>${v.atendente}</b>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
              ${tags}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // Estado da aba inicial: critica por padrao; se nao tiver critica e tiver leve, abre em leve
  if(typeof window._abaIncompletas === 'undefined') window._abaIncompletas = 'critica';
  if(criticas.length === 0 && leves.length > 0) window._abaIncompletas = 'leve';
  if(leves.length === 0 && criticas.length > 0) window._abaIncompletas = 'critica';

  // Guardar listas no escopo da funcao de troca
  window._incompletasCriticas = criticas;
  window._incompletasLeves = leves;
  window._incompletasLabels = labels;

  function abaStyle(active, sev){
    const cor = sev === 'critica' ? '#ff6347' : '#fbbf24';
    return active
      ? `padding:8px 14px;background:${sev==='critica'?'rgba(255,99,71,.15)':'rgba(251,191,36,.15)'};border:1px solid ${sev==='critica'?'rgba(255,99,71,.4)':'rgba(251,191,36,.4)'};border-radius:8px;color:${cor};font-size:12px;font-weight:700;cursor:pointer`
      : `padding:8px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer`;
  }

  const aba = window._abaIncompletas;
  const itensAba = aba === 'critica' ? criticas : leves;

  const existing = document.getElementById('modal-incompletas');
  if(existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'modal-incompletas';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:620px;width:100%;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div>
            <div style="font-size:15px;font-weight:700">⚠️ Obs incompletas</div>
            <div style="font-size:11px;color:var(--text4);margin-top:3px">Corrija no FoneNinja · sync automático a cada hora</div>
          </div>
          <button onclick="document.getElementById('modal-incompletas').remove()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">×</button>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="trocarAbaIncompletas('critica')" style="${abaStyle(aba==='critica','critica')}">
            🔴 Críticas (${criticas.length})
          </button>
          <button onclick="trocarAbaIncompletas('leve')" style="${abaStyle(aba==='leve','leve')}">
            🟡 Leves (${leves.length})
          </button>
        </div>
        <div style="font-size:11px;color:var(--text4);margin-top:10px">
          ${aba==='critica'
            ? '🔴 Vendas <b>com device</b> faltando info — impacta atribuição de receita e comissão'
            : '🟡 Vendas <b>só de acessórios</b> faltando info — impacto menor, mas vale corrigir'}
        </div>
      </div>
      <div id="modal-incompletas-body" style="padding:0 24px;overflow-y:auto;flex:1">
        ${rowsHTML(itensAba, aba)}
      </div>
      <div style="padding:14px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--text4);flex-shrink:0">
        💡 Formatos aceitos: <b>cart/urban</b> · vendedor: <b>david/isa/mel/pietra</b> · atendente: <b>davi/anne/vitinho/denilson/pietra</b>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target === modal) modal.remove(); });
}

function trocarAbaIncompletas(sev){
  window._abaIncompletas = sev;
  // Re-renderizar abrindo de novo (preserva estado)
  abrirModalIncompletas();
}

          <input id="ec-obs" value="${obs}" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;box-sizing:border-box">
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:20px">
        <button onclick="document.getElementById('modal-editar-custo').remove()"
          style="flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text3);font-size:13px;cursor:pointer">Cancelar</button>
        <button onclick="salvarEdicaoCusto(${id})"
          style="flex:2;padding:10px;background:var(--cart);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Salvar alterações</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  document.getElementById('ec-desc').focus();
}

async function salvarEdicaoCusto(id){
  const desc  = document.getElementById('ec-desc').value.trim();
  const valor = parseFloat(document.getElementById('ec-valor').value);
  const loja  = document.getElementById('ec-loja').value;
  const area  = document.getElementById('ec-area').value;
  const data  = document.getElementById('ec-data').value;
  const obs   = document.getElementById('ec-obs').value.trim();

  if(!desc || isNaN(valor)){
    alert('Preencha descrição e valor'); return;
  }

  const btn = document.querySelector('#modal-editar-custo button:last-child');
  btn.textContent = 'Salvando...'; btn.disabled = true;

  const r = await fetch(SB_URL+'/rest/v1/custos?id=eq.'+id, {
    method: 'PATCH',
    headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_TOKEN,'Content-Type':'application/json'},
    body: JSON.stringify({ descricao:desc, valor, loja, area, data, obs })
  });

  if(r.ok){
    document.getElementById('modal-editar-custo').remove();
    // Atualizar cache local
    const idx = (_custosCache||[]).findIndex(c=>c.id===id);
    if(idx>=0){
      _custosCache[idx] = {..._custosCache[idx], desc, descricao:desc, valor, loja, area, data, obs};
    }
    renderContent();
    mostrarNotif('✅ Custo atualizado');
  } else {
    btn.textContent = 'Salvar alterações'; btn.disabled = false;
    alert('Erro ao salvar — tente novamente');
  }
}


// -- VENDAS COM PRODUTO NAO IDENTIFICADO --------------------------------------
function getVendasSemDeviceDetalhado(){
  const v = filterByPeriod(allVendas);
  return v.filter(x => {
    // _produtos existe mas nenhum e principal -- e FoneNinja diz que tem produtos
    if(x._produtos == null) return false;
    const temPrincipal = x._produtos.some(p => isPrincipal(p));
    const temAcess = x._produtos.some(p => !isPrincipal(p));
    const qtd = parseInt(x.qtd_produtos||0);
    // Suspeito: tem acessorios, sem devices detalhados, e qtd_produtos > 0
    return !temPrincipal && temAcess && qtd > 0;
  }).map(v => ({
    id: v.id,
    data: v.data_saida.slice(0,10),
    loja: v.loja || '—',
    valor: v.valor_total,
    qtd_fn: v.qtd_produtos, // o que FoneNinja diz
    atendente: v.atendente_obs || '—',
    vendedor: v.vendedor_obs || '—',
    produtos: v._produtos.map(p=>p.titulo?.slice(0,20)).join(', ')
  })).sort((a,b)=>a.data.localeCompare(b.data));
}


function abrirModalSemDevice(){
  const lista = getVendasSemDeviceDetalhado();
  const existing = document.getElementById('modal-sem-device');
  if(existing) existing.remove();

  const rows = lista.map(v => `
    <div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px">
            #${v.id} · ${v.data.slice(5).replace('-','/')} · ${brl(v.valor||0)}
          </div>
          <div style="font-size:11px;color:var(--text4);margin-bottom:3px">
            🏪 ${v.loja} · vendedor: ${v.vendedor} · atendente: ${v.atendente}
          </div>
          <div style="font-size:11px;color:var(--text3)">
            Produtos no FN: <b>${v.qtd_fn}</b> · Identificados: <i>${v.produtos.slice(0,50)}</i>
          </div>
        </div>
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(251,191,36,.12);color:#fbbf24;font-weight:600;flex-shrink:0">sem device</span>
      </div>
    </div>`).join('');

  const modal = document.createElement('div');
  modal.id = 'modal-sem-device';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:600px;width:100%;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
        <div>
          <div style="font-size:15px;font-weight:700">🔍 Vendas sem device identificado — ${lista.length}</div>
          <div style="font-size:11px;color:var(--text4);margin-top:3px">Corrija o vínculo do produto no FoneNinja para contabilizar corretamente</div>
        </div>
        <button onclick="document.getElementById('modal-sem-device').remove()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">×</button>
      </div>
      <div style="padding:0 24px;overflow-y:auto;flex:1">${rows}</div>
      <div style="padding:14px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--text4);flex-shrink:0">
        💡 O produto foi registrado como acessório no FoneNinja mas deveria ser um device (iPhone/iPad/etc)
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}


window.onload=async function(){
  // Mantém SB_TOKEN sincronizado com a sessão (inclui refresh automático do token).
  sb.auth.onAuthStateChange((_event, session)=>{
    SB_TOKEN = session ? session.access_token : SB_KEY;
  });
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    SB_TOKEN=session.access_token;
    enterApp();
    loadAllData();
  } else {
    // Sem sessão: mostrar tela de login
    const ls=document.getElementById('login-screen');
    if(ls) ls.style.display='flex';
  }
};
</script>
